# Disposable E2E-only values. Never reuse these values for operations or production.
spring:
  datasource:
    url: ${E2E_DB_URL:jdbc:postgresql://localhost:5433/room_reservation_test}
    username: ${E2E_DB_USERNAME:room_reservation}
    password: ${E2E_DB_PASSWORD:room_reservation}
  flyway:
    enabled: true
    clean-disabled: false
  jpa:
    show-sql: false

# Session cookie Secure/HttpOnly are defined in application.yml.
# SameSite is profile-owned and intentionally inactive in E2E unless needed.
# server:
#   servlet:
#     session:
#       cookie:
#         same-site: lax

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin1234}
  e2e-cleanup:
    enabled: ${E2E_CLEANUP_ENABLED:true}
