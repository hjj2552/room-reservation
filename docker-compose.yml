services:
  postgres:
    image: postgres:16
    container_name: room-reservation-postgres
    environment:
      POSTGRES_DB: room_reservation
      POSTGRES_USER: room_reservation
      POSTGRES_PASSWORD: room_reservation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U room_reservation -d room_reservation"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16
    container_name: room-reservation-postgres-test
    environment:
      POSTGRES_DB: room_reservation_test
      POSTGRES_USER: room_reservation
      POSTGRES_PASSWORD: room_reservation
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U room_reservation -d room_reservation_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
