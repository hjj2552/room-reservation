name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: postgres:16
        env:
          POSTGRES_DB: room_reservation_test
          POSTGRES_USER: room_reservation
          POSTGRES_PASSWORD: room_reservation
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U room_reservation -d room_reservation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: ./gradlew test
