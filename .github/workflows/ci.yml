name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  worker-validation:
    name: Worker validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci

      - name: Check Worker TypeScript
        run: npm run check

      - name: Run Worker unit and contract tests
        run: npm test

      - name: Run isolated PostgreSQL integration and baseline replay
        run: npm run test:isolated-postgres

      - name: Build Worker dry-run artifact
        run: npm run build

      - name: Audit Worker dependencies
        run: npm audit --audit-level=high

  worker-frontend-e2e:
    name: Frontend E2E against Worker
    runs-on: ubuntu-latest
    needs: worker-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            frontend/package-lock.json

      - name: Install Worker dependencies
        working-directory: worker
        run: npm ci

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify Pages same-origin API proxy
        working-directory: frontend
        run: npm run test:functions

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run full Frontend E2E against disposable Worker PostgreSQL
        working-directory: worker
        run: npm run test:local-e2e

      - name: Upload Worker Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: worker-playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Worker E2E test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: worker-e2e-test-results
          path: frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: postgres:16
        env:
          POSTGRES_DB: room_reservation_test
          POSTGRES_USER: room_reservation
          POSTGRES_PASSWORD: room_reservation
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U room_reservation -d room_reservation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run backend tests
        run: ./gradlew test

  frontend:
    name: Frontend build and E2E
    runs-on: ubuntu-latest
    needs: backend-test
    services:
      postgres-test:
        image: postgres:16
        env:
          POSTGRES_DB: room_reservation_test
          POSTGRES_USER: room_reservation
          POSTGRES_PASSWORD: room_reservation
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U room_reservation -d room_reservation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      E2E_BACKEND_PROFILE: e2e
      E2E_BACKEND_URL: http://127.0.0.1:8080/api/public/settings
      E2E_DB_URL: jdbc:postgresql://127.0.0.1:5433/room_reservation_test
      E2E_DB_USERNAME: room_reservation
      E2E_DB_PASSWORD: room_reservation
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
      VITE_API_PROXY_TARGET: http://127.0.0.1:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x ./gradlew

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend jar for E2E
        working-directory: backend
        run: ./gradlew bootJar

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run admin Playwright E2E
        working-directory: frontend
        run: npm run e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: admin-playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: admin-e2e-test-results
          path: frontend/test-results
          if-no-files-found: ignore
          retention-days: 7
