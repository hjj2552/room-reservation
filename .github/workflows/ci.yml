name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: postgres:16
        env:
          POSTGRES_DB: room_reservation_test
          POSTGRES_USER: room_reservation
          POSTGRES_PASSWORD: room_reservation
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U room_reservation -d room_reservation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run backend tests
        run: ./gradlew test

  admin-frontend:
    name: Admin frontend build and E2E
    runs-on: ubuntu-latest
    needs: backend-test
    services:
      postgres-test:
        image: postgres:16
        env:
          POSTGRES_DB: room_reservation_test
          POSTGRES_USER: room_reservation
          POSTGRES_PASSWORD: room_reservation
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U room_reservation -d room_reservation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      E2E_BACKEND_PROFILE: e2e
      E2E_BACKEND_URL: http://127.0.0.1:8080/api/public/settings
      E2E_DB_URL: jdbc:postgresql://127.0.0.1:5433/room_reservation_test
      E2E_DB_USERNAME: room_reservation
      E2E_DB_PASSWORD: room_reservation
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
      VITE_API_PROXY_TARGET: http://127.0.0.1:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x ./gradlew

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Install admin frontend dependencies
        working-directory: admin-frontend
        run: npm ci

      - name: Build admin frontend
        working-directory: admin-frontend
        run: npm run build

      - name: Build backend jar for E2E
        working-directory: backend
        run: ./gradlew bootJar

      - name: Install Playwright browsers
        working-directory: admin-frontend
        run: npx playwright install --with-deps chromium

      - name: Run admin Playwright E2E
        working-directory: admin-frontend
        run: npm run e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-playwright-report
          path: admin-frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-e2e-test-results
          path: admin-frontend/test-results
          if-no-files-found: ignore
          retention-days: 7
