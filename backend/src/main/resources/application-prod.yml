spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
  jpa:
    show-sql: false

server:
  forward-headers-strategy: framework
  # Session cookie Secure/HttpOnly are defined in application.yml.
  # Decide SameSite after the production frontend/backend domains are finalized.
  # servlet:
  #   session:
  #     cookie:
  #       same-site: none

app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
