spring:
  datasource:
    url: ${E2E_DB_URL:jdbc:postgresql://localhost:5433/room_reservation_test}
    username: ${E2E_DB_USERNAME:room_reservation}
    password: ${E2E_DB_PASSWORD:room_reservation}
  flyway:
    enabled: true
    clean-disabled: false
