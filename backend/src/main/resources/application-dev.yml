spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
  jpa:
    show-sql: false

# Session cookie Secure/HttpOnly/SameSite=Lax are defined in application.yml.

app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  e2e-cleanup:
    enabled: ${E2E_CLEANUP_ENABLED:false}
